<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- AutoTools Web Screen Variable (JS) -->
  <meta name="autotoolswebscreen"
        type="variablejs"
        id="projects_json"
        label="JSON Projects"
        description="JSON object keyed by project name, each value is an array of task title strings."
        defaultValue="" />

  <title>Projects</title>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@600;700;800&display=swap');

    :root {
      color-scheme: dark;
      --bg:        #080c14;
      --surface:   #0f1520;
      --border:    rgba(255,255,255,.07);
      --accent:    #4f8ef7;
      --accent-dim:rgba(79,142,247,.15);
      --text:      #dde6f8;
      --muted:     rgba(221,230,248,.45);
      --ok-bg:     rgba(52,199,89,.12);
      --ok-border: rgba(52,199,89,.35);
      --bad-bg:    rgba(235,87,87,.12);
      --bad-border:rgba(235,87,87,.35);
      --radius:    14px;
      --mono: 'DM Mono', ui-monospace, monospace;
      --head: 'Syne', system-ui, sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--mono);
      font-size: 14px;
      line-height: 1.55;
      min-height: 100vh;
    }

    .wrap { padding: 18px 14px 60px; max-width: 680px; margin: 0 auto; }

    /* ── header ── */
    header {
      display: flex;
      align-items: baseline;
      gap: 10px;
      margin-bottom: 18px;
    }
    header h1 {
      font-family: var(--head);
      font-size: 28px;
      font-weight: 800;
      letter-spacing: -.5px;
      color: #fff;
    }
    header .count-badge {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--muted);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 2px 9px;
    }

    /* ── status pill ── */
    .status-row { margin-bottom: 14px; display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
    .pill {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 5px 11px; border-radius: 999px; font-size: 12px;
      border: 1px solid var(--border);
      background: var(--surface);
    }
    .pill.ok  { background: var(--ok-bg);  border-color: var(--ok-border); }
    .pill.bad { background: var(--bad-bg); border-color: var(--bad-border); }

    /* ── search ── */
    .search-wrap { position: relative; margin-bottom: 16px; }
    .search-wrap svg {
      position: absolute; left: 13px; top: 50%; transform: translateY(-50%);
      opacity: .4; pointer-events: none;
    }
    input[type="text"] {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 11px 12px 11px 38px;
      border-radius: var(--radius);
      font-family: var(--mono);
      font-size: 14px;
      outline: none;
      transition: border-color .15s;
    }
    input[type="text"]:focus { border-color: var(--accent); }
    input::placeholder { color: var(--muted); }

    /* ── result meta ── */
    .result-meta {
      font-size: 11px;
      color: var(--muted);
      margin-bottom: 12px;
      letter-spacing: .04em;
      text-transform: uppercase;
    }

    /* ── project card ── */
    .project-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: 10px;
      overflow: hidden;
      transition: border-color .15s;
    }
    .project-card:hover { border-color: rgba(255,255,255,.13); }

    .project-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 13px 15px;
      cursor: pointer;
      user-select: none;
      gap: 10px;
    }
    .project-header:active { background: rgba(255,255,255,.02); }

    .project-name {
      font-family: var(--head);
      font-size: 15px;
      font-weight: 700;
      color: #fff;
      flex: 1;
      line-height: 1.3;
    }
    .project-name mark {
      background: rgba(79,142,247,.3);
      color: #fff;
      border-radius: 3px;
      padding: 0 1px;
    }

    .task-count {
      font-size: 11px;
      color: var(--muted);
      white-space: nowrap;
      background: rgba(255,255,255,.05);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 2px 8px;
    }

    .chevron {
      color: var(--muted);
      transition: transform .2s;
      flex-shrink: 0;
    }
    .project-card.open .chevron { transform: rotate(90deg); }

    /* ── task list ── */
    .task-list {
      display: none;
      border-top: 1px solid var(--border);
      padding: 4px 0 8px;
    }
    .project-card.open .task-list { display: block; }

    .task-item {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 8px 15px;
      border-radius: 8px;
      margin: 2px 6px;
      transition: background .1s;
    }
    .task-item:hover { background: rgba(255,255,255,.03); }

    .task-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--accent);
      opacity: .5;
      flex-shrink: 0;
      margin-top: 6px;
    }
    .task-title {
      color: var(--text);
      font-size: 13px;
      line-height: 1.45;
    }
    .task-title mark {
      background: rgba(79,142,247,.3);
      color: #fff;
      border-radius: 3px;
      padding: 0 1px;
    }

    .no-tasks { padding: 10px 15px; color: var(--muted); font-size: 13px; }

    /* ── empty state ── */
    .empty {
      text-align: center;
      padding: 50px 20px;
      color: var(--muted);
    }
    .empty .emoji { font-size: 36px; margin-bottom: 10px; }
    .empty p { font-size: 14px; }

    /* ── debug ── */
    .debug-card {
      margin-top: 20px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }
    .debug-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 14px;
      border-bottom: 1px solid var(--border);
    }
    .debug-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; }
    .btn-sm {
      background: rgba(255,255,255,.05);
      border: 1px solid var(--border);
      color: var(--muted);
      font-family: var(--mono);
      font-size: 11px;
      padding: 4px 10px;
      border-radius: 8px;
      cursor: pointer;
    }
    .btn-sm:active { opacity: .7; }
    #debug {
      padding: 10px 14px;
      font-size: 11px;
      color: var(--muted);
      white-space: pre-wrap;
      word-break: break-word;
      max-height: 180px;
      overflow-y: auto;
    }
  </style>
</head>

<body>
<div class="wrap">

  <header>
    <h1>Projects</h1>
    <span class="count-badge" id="headerCount">0 projects</span>
  </header>

  <div class="status-row">
    <span class="pill bad" id="injectPill">⛔ not received</span>
  </div>

  <div class="search-wrap">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
    </svg>
    <input id="search" type="text" placeholder="Search projects and tasks…" autocomplete="off" />
  </div>

  <div class="result-meta" id="resultMeta"></div>
  <div id="projectList"></div>

  <!-- debug -->
  <div class="debug-card">
    <div class="debug-header">
      <span class="debug-label">Debug</span>
      <button class="btn-sm" id="btnClearDebug">Clear</button>
    </div>
    <pre id="debug"></pre>
  </div>

</div>

<script>
/* ── debug ── */
const T0 = performance.now();
function dbg(label, extra) {
  const ms = Math.round(performance.now() - T0);
  const line = extra !== undefined ? `${ms}ms  ${label}  → ${extra}` : `${ms}ms  ${label}`;
  const el = document.getElementById("debug");
  if (el) el.textContent += (el.textContent ? "\n" : "") + line;
}
window.addEventListener("error", e => dbg("error", e.message));
window.addEventListener("unhandledrejection", e => dbg("rejection", String(e.reason)));
dbg("script start");

/* ── state ── */
let PROJECTS = {}; // { "Project Name": ["task1","task2",...] }

/* ── highlight helper ── */
function highlight(text, q) {
  if (!q) return escHtml(text);
  const re = new RegExp("(" + q.replace(/[.*+?^${}()|[\]\\]/g, "\\$&") + ")", "gi");
  return escHtml(text).replace(re, "<mark>$1</mark>");
}
function escHtml(s) {
  return String(s ?? "")
    .replace(/&/g,"&amp;").replace(/</g,"&lt;")
    .replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

/* ── render ── */
function render(q) {
  const list = document.getElementById("projectList");
  const meta = document.getElementById("resultMeta");
  q = (q || "").trim().toLowerCase();

  const projectNames = Object.keys(PROJECTS);
  if (projectNames.length === 0) {
    list.innerHTML = `<div class="empty"><div class="emoji">📭</div><p>No projects loaded.</p></div>`;
    meta.textContent = "";
    return;
  }

  // filter
  const filtered = projectNames.map(name => {
    const tasks = PROJECTS[name] || [];
    if (!q) return { name, tasks, matchedTasks: tasks };
    const nameMatch = name.toLowerCase().includes(q);
    const matchedTasks = tasks.filter(t => t.toLowerCase().includes(q));
    if (!nameMatch && matchedTasks.length === 0) return null;
    // if project name matches, show all tasks; otherwise show only matched tasks
    return { name, tasks, matchedTasks: nameMatch ? tasks : matchedTasks };
  }).filter(Boolean);

  // counts
  const totalTasks = filtered.reduce((s, p) => s + p.tasks.length, 0);
  meta.textContent = q
    ? `${filtered.length} project${filtered.length!==1?"s":""} · ${filtered.reduce((s,p)=>s+p.matchedTasks.length,0)} task${totalTasks!==1?"s":""} matched`
    : `${filtered.length} project${filtered.length!==1?"s":""} · ${totalTasks} task${totalTasks!==1?"s":""}`;

  if (filtered.length === 0) {
    list.innerHTML = `<div class="empty"><div class="emoji">🔍</div><p>No results for "<b>${escHtml(q)}</b>"</p></div>`;
    return;
  }

  list.innerHTML = filtered.map(({ name, tasks, matchedTasks }) => {
    const tasksHtml = matchedTasks.length === 0
      ? `<div class="no-tasks">No tasks</div>`
      : matchedTasks.map(t => `
          <div class="task-item">
            <div class="task-dot"></div>
            <div class="task-title">${highlight(t, q)}</div>
          </div>`).join("");

    return `
      <div class="project-card${q ? " open" : ""}" onclick="toggleCard(this)">
        <div class="project-header">
          <div class="project-name">${highlight(name, q)}</div>
          <span class="task-count">${tasks.length} task${tasks.length!==1?"s":""}</span>
          <svg class="chevron" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <path d="m9 18 6-6-6-6"/>
          </svg>
        </div>
        <div class="task-list">${tasksHtml}</div>
      </div>`;
  }).join("");

  dbg("render", `${filtered.length} projects`);
}

function toggleCard(card) {
  card.classList.toggle("open");
}

/* ── load ── */
function load() {
  dbg("load start");
  const raw = (typeof projects_json !== "undefined") ? projects_json : "";
  dbg("variable", `len=${(raw||"").length}`);

  const pill = document.getElementById("injectPill");
  const injected = raw && raw.trim() && !raw.includes("{projects_json}");

  if (!injected) {
    pill.className = "pill bad";
    pill.textContent = "⛔ projects_json not received";
    dbg("stop", "no variable");
    render("");
    return;
  }

  let parsed;
  try {
    parsed = JSON.parse(raw);
    dbg("parse ok", `${Object.keys(parsed).length} projects`);
  } catch(e) {
    pill.className = "pill bad";
    pill.textContent = "⛔ JSON parse error";
    dbg("parse error", e.message);
    render("");
    return;
  }

  PROJECTS = parsed;
  const pCount = Object.keys(PROJECTS).length;
  const tCount = Object.values(PROJECTS).reduce((s, a) => s + a.length, 0);

  pill.className = "pill ok";
  pill.textContent = `✅ ${pCount} project${pCount!==1?"s":""} · ${tCount} tasks`;
  document.getElementById("headerCount").textContent = `${pCount} project${pCount!==1?"s":""}`;

  render("");
  dbg("load done");
}

/* ── search (debounced) ── */
let __t;
document.getElementById("search").addEventListener("input", e => {
  clearTimeout(__t);
  __t = setTimeout(() => render(e.target.value), 80);
});

document.getElementById("btnClearDebug").addEventListener("click", () => {
  document.getElementById("debug").textContent = "";
  dbg("cleared");
});

/* ── go ── */
load();
</script>
</body>
</html>
